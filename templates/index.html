<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserTech - Registro de Daño</title>
    <!-- Enlace al CSS externo -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Iconos (FontAwesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        
        <!-- Sidebar (Menú Lateral) -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-microchip"></i>
                <span>Hardwarex</span>
            </div>

            <nav class="menu">
                <a href="index.html" class="menu-item active">
                    <i class="fa-solid fa-circle-plus"></i> Registrar Daño
                </a>
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-clock-rotate-left"></i> Ver Historial
                </a>
                <a href="#" class="menu-item">
                    <i class="fa-solid fa-user"></i> Mi Perfil
                </a>
            </nav>

            <div class="logout-area">
                <a href="#" class="menu-item text-danger">
                    <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                </a>
            </div>
        </aside>

        <!-- Contenido Principal -->
        <main class="content">
            <!-- Header Superior -->
            <header class="top-bar">
                <h2>Registro de Solicitud de Mantenimiento</h2>
                <div class="user-info">
                    <div class="notification">
                        <i class="fa-regular fa-bell"></i>
                    </div>
                    <div class="avatar">
                        <img src="https://ui-avatars.com/api/?name=Juan+Doe&background=10b981&color=fff" alt="User">
                    </div>
                    <div class="user-details">
                        <span class="name">Juan Doe</span>
                        <span class="role">Usuario</span>
                    </div>
                </div>
            </header>

            <!-- Formulario de Registro -->
            <section class="register-card">
                <div class="card-header">
                    <h3><i class="fa-solid fa-laptop-medical"></i> Nuevo registro de daño</h3>
                    <p>Por favor ingresa los detalles del problema.</p>
                </div>

                <form action="#" method="POST" class="main-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="device-name">Marca del Dispositivo</label>
                            <input type="text" id="device-name" placeholder="Ej: Laptop Dell XPS 15" required>
                        </div>
                        <div class="form-group">
                            <label for="issue-type">Tipo de Daño</label>
                            <select id="issue-type" required>
                                <option value="" disabled selected>Selecciona una opción...</option>
                                <option value="hardware">Falla de Hardware (Pantalla, Teclado)</option>
                                <option value="software">Falla de Software / Virus</option>
                                <option value="lentitud">Lentitud Extrema</option>
                                <option value="otro">Otro...</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="urgency">Nivel de Urgencia</label>
                            <select id="urgency" required>
                                <option value="baja">Baja</option>
                                <option value="media" selected>Media</option>
                                <option value="alta">Alta</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="serial-number">Número de Serie (Opcional)</label>
                            <input type="text" id="serial-number" placeholder="XxXxXxXxXx">
                        </div>
                    </div>

                    <div class="form-group full-width">
                        <label for="description">Descripción del Daño</label>
                        <textarea id="description" rows="5" placeholder="Describe detalladamente qué está pasando con el equipo..." required></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Adjuntar Imagen (Opcional)</label>
                        <div class="file-upload">
                            <i class="fa-solid fa-cloud-arrow-up"></i>
                            <span>Arrastra una imagen aquí o haz clic para subir</span>
                            <input type="file" class="input-file">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-cancel">Cancelar</button>
                        <button type="submit" class="btn-submit">Enviar Solicitud</button>
                    </div>
                </form>
            </section>

        </main>
    </div>

</body>
</html>
